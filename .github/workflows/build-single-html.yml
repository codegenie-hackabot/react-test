name: Build React App and Commit to site folder

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-and-commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # needed to commit

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Prepare site folder
        run: |
          # Remove existing site folder (if any) and create fresh
          rm -rf site
          mkdir -p site
          # Copy build output to site folder
          cp -r build/* site/

      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add site/
          # Only commit if there are changes
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update site folder [skip ci]"
            git push
          fi
