name: Initialize React App
on:
  push:
    branches: [ main ]
  workflow_dispatch:        # allows manual trigger
permissions:
  contents: write           # needed to push changes back
jobs:
  init-react:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Check if package.json exists
        id: check_package
        run: |
          if [ -f package.json ]; then
            echo "package_exists=true" >> $GITHUB_OUTPUT
          else
            echo "package_exists=false" >> $GITHUB_OUTPUT
          fi
      - name: Setup Node.js
        if: steps.check_package.outputs.package_exists == 'false'
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Create React App
        if: steps.check_package.outputs.package_exists == 'false'
        run: npx create-react-app . --force --use-npm
        # --force allows installation even if the directory isn't completely empty
        # --use-npm forces npm (omit to use the default package manager)
      - name: Commit and push changes
        if: steps.check_package.outputs.package_exists == 'false'
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add .
          git commit -m "Initialize React app with create-react-app" || echo "No changes to commit"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
